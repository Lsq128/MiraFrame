<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>openOii 合成预览</title>
  <style>
    body{margin:0;background:#101114;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{min-height:100vh;display:grid;place-items:center;padding:24px}
    .wrap{width:min(960px,100%)}
    video{width:100%;max-height:72vh;background:#000;border-radius:8px}
    .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px}
    button{background:#f8fafc;color:#111827;border:0;border-radius:6px;padding:8px 12px;font-weight:600;cursor:pointer}
    p{margin:0;color:#cbd5e1;font-size:14px}
  </style>
</head>
<body>
  <main>
    <div class="wrap">
      <video id="player" controls autoplay playsinline></video>
      <div class="bar">
        <p id="status"></p>
        <button id="restart">从头播放</button>
      </div>
    </div>
  </main>
  <script>
    const clips = ["https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/c8/20260601/773ecfda/27372864-metadata_user_d770f332f71ba080.mp4?Expires=1780411822&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=F9NpcukxQSMVSLrx8L%2BWgOjp41U%3D","https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/91/20260601/ab45fdf0/28235125-metadata_user_58847a136d3aa48c.mp4?Expires=1780411865&OSSAccessKeyId=LTAI5tPxpiCM2hjmWrFXrym1&Signature=pxE%2FV%2BelnNIlCDyzbzzK6n2V1i0%3D","https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/13/20260601/f73b331d/16500416-metadata_user_787dd34445f034a0.mp4?Expires=1780409452&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=lboL9CoK6kQMp2QAFZKfe7MahbM%3D","https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/78/20260601/f73b331d/70224506-metadata_user_b205d6059a2e507d.mp4?Expires=1780409687&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=4wjC0nqadI7oCYrfkVXULYM1PoQ%3D","https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/ab/20260601/f73b331d/16497159-metadata_user_069c0ccd4ca7264a.mp4?Expires=1780409917&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=w3cf5ETIY3CLjseE5Q0QisdNALo%3D","https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/aa/20260601/773ecfda/42473465-metadata_user_00afd7a743597c06.mp4?Expires=1780412033&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=9eP6wSJS2wzBTf%2FCmmH4B0EmvkU%3D"];
    const player = document.getElementById('player');
    const status = document.getElementById('status');
    let index = 0;
    function load(i) {
      index = Math.max(0, Math.min(i, clips.length - 1));
      player.src = clips[index];
      status.textContent = '合成预览：镜头 ' + (index + 1) + ' / ' + clips.length;
      player.play().catch(() => {});
    }
    player.addEventListener('ended', () => {
      if (index + 1 < clips.length) load(index + 1);
    });
    document.getElementById('restart').addEventListener('click', () => load(0));
    load(0);
  </script>
</body>
</html>
