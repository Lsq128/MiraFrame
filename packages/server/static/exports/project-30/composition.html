<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>openOii 合成预览</title>
  <style>
    body{margin:0;background:#101114;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{min-height:100vh;display:grid;place-items:center;padding:24px}
    .wrap{width:min(960px,100%)}
    video{width:100%;max-height:72vh;background:#000;border-radius:8px}
    .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px}
    button{background:#f8fafc;color:#111827;border:0;border-radius:6px;padding:8px 12px;font-weight:600;cursor:pointer}
    p{margin:0;color:#cbd5e1;font-size:14px}
  </style>
</head>
<body>
  <main>
    <div class="wrap">
      <video id="player" controls autoplay playsinline></video>
      <div class="bar">
        <p id="status"></p>
        <button id="restart">从头播放</button>
      </div>
    </div>
  </main>
  <script>
    const clips = ["https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/d0/20260602/773ecfda/81483286-metadata_user_3c008e873c5a7eee.mp4?Expires=1780495583&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=g6Vgs92J10Vt%2FfCWgS8zolNhupo%3D","https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/f3/20260602/773ecfda/60175311-metadata_user_9df1503ec622a8a6.mp4?Expires=1780495627&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=3F4F3RuwqxuadJO%2BsV6jWUPq3PQ%3D","https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/77/20260602/773ecfda/79598068-metadata_user_b6ae9bb6199b81bd.mp4?Expires=1780495677&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=SvWjcyf4UWq6r7IZLtHyUq13Gd8%3D","https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/11/20260602/773ecfda/24154082-metadata_user_7e31d9504556d562.mp4?Expires=1780495725&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=Ml4VbK%2BBT%2BMGJwntO0%2BB2Mm3FkI%3D","https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/ae/20260602/773ecfda/8396490-metadata_user_d4e865a8c9698dff.mp4?Expires=1780495768&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=LLnmRQo2sVL6qEMlStm0vPyN0Vk%3D","https://dashscope-a717.oss-accelerate.aliyuncs.com/1d/09/20260602/773ecfda/25266234-metadata_user_7ff6966d002a5670.mp4?Expires=1780495806&OSSAccessKeyId=LTAI5tJjG6wsHad1Sf7iezX4&Signature=eJYp1PNbSxFnTvXEAKOG%2BMF39SM%3D"];
    const player = document.getElementById('player');
    const status = document.getElementById('status');
    let index = 0;
    function load(i) {
      index = Math.max(0, Math.min(i, clips.length - 1));
      player.src = clips[index];
      status.textContent = '合成预览：镜头 ' + (index + 1) + ' / ' + clips.length;
      player.play().catch(() => {});
    }
    player.addEventListener('ended', () => {
      if (index + 1 < clips.length) load(index + 1);
    });
    document.getElementById('restart').addEventListener('click', () => load(0));
    load(0);
  </script>
</body>
</html>
